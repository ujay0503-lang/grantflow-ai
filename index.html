<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<title>通能企業補助計畫生成器</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0f1221;
color:white;
display:flex;
height:100vh;
}

/* sidebar */

.sidebar{
width:240px;
background:#151834;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:25px;
}

.menu{
opacity:.7;
margin-bottom:15px;
}

.menu:hover{
opacity:1;
cursor:pointer;
}

/* main */

.main{
flex:1;
padding:40px;
overflow:auto;
}

.header{
font-size:30px;
margin-bottom:10px;
}

.subtitle{
opacity:.6;
margin-bottom:30px;
}

/* panel */

.panel{
background:#1c2147;
padding:30px;
border-radius:16px;
max-width:900px;
box-shadow:0 20px 60px rgba(0,0,0,.3);
}

/* sections */

.section{
margin-bottom:35px;
}

.section-title{
font-size:18px;
margin-bottom:15px;
opacity:.9;
}

/* inputs */

input,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:6px;
margin-bottom:12px;
font-size:15px;
}

/* button */

button{
background:#5b8cff;
border:none;
padding:14px 26px;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#7aa2ff;
}

/* result */

.result{
margin-top:30px;
background:#0d1029;
padding:25px;
border-radius:10px;
min-height:220px;
white-space:pre-wrap;
line-height:1.7;
}

/* loader */

.loader{
display:none;
opacity:.6;
margin-top:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
通能企業補助
</div>

<div class="menu">計畫生成</div>
<div class="menu">生成紀錄</div>
<div class="menu">設定</div>

</div>

<div class="main">

<div class="header">
通能企業補助計畫生成器
</div>

<div class="subtitle">
AI協助快速生成 SBIR / 創業補助提案
</div>

<div class="panel">

<div class="section">

<div class="section-title">
基本資料（必填）
</div>

<label>公司名稱</label>
<input id="company">

<label>成立年份</label>
<input id="year">

<label>公司簡介</label>
<textarea id="company_desc"></textarea>

<label>團隊背景</label>
<textarea id="team"></textarea>

<label>項目名稱</label>
<input id="project">

<label>項目描述</label>
<textarea id="project_desc"></textarea>

<label>技術核心</label>
<textarea id="tech"></textarea>

</div>

<div class="section">

<div class="section-title">
進階補充（選填可不填，由平台協助生成）
</div>

<label>市場分析</label>
<textarea id="market"></textarea>

<label>目標客戶</label>
<textarea id="customer"></textarea>

<label>競品分析</label>
<textarea id="competitor"></textarea>

<label>差異化優勢</label>
<textarea id="advantage"></textarea>

<label>商業模式</label>
<textarea id="business"></textarea>

<label>研發里程碑</label>
<textarea id="milestone"></textarea>

<label>預期成果</label>
<textarea id="result_expect"></textarea>

</div>

<button onclick="generate()">
生成補助計畫書
</button>

<div class="loader" id="loader">
平台智能 正在生成內容...
</div>

<div class="result" id="result">
生成結果會顯示在這裡
</div>

</div>

</div>

<script>

async function generate(){

const data={

company:document.getElementById("company").value,
year:document.getElementById("year").value,
company_desc:document.getElementById("company_desc").value,
team:document.getElementById("team").value,
project:document.getElementById("project").value,
project_desc:document.getElementById("project_desc").value,
tech:document.getElementById("tech").value,

market:document.getElementById("market").value,
customer:document.getElementById("customer").value,
competitor:document.getElementById("competitor").value,
advantage:document.getElementById("advantage").value,
business:document.getElementById("business").value,
milestone:document.getElementById("milestone").value,
result_expect:document.getElementById("result_expect").value

}

const loader=document.getElementById("loader")
const result=document.getElementById("result")

loader.style.display="block"
result.innerText=""

const res=await fetch("/api/generate",{

method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(data)

})

const r=await res.json()

loader.style.display="none"
result.innerText=r.result

}

</script>

</body>
</html>
