<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>GrantFlow AI</title></head><body><h1>GrantFlow AI</h1><form id='f'><input id='company' placeholder='公司名稱'><button>生成</button></form><pre id='r'></pre><script>document.getElementById('f').onsubmit=async(e)=>{e.preventDefault();const res=await fetch('/api/generate',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({company:company.value,phase:'SBIR Phase 1',product:'x',industry:'y',problem:'z',technology:'t',market:'m',team:'u'})}); document.getElementById('r').textContent=await res.text();}</script></body></html>
