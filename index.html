<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>通能企業補助計畫生成器</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0f1221;
color:#fff;
display:flex;
height:100vh;
}

/* sidebar */

.sidebar{
width:240px;
background:#151834;
padding:30px 20px;
}

.logo{
font-size:20px;
font-weight:bold;
margin-bottom:25px;
}

.menu{
opacity:.7;
margin-bottom:14px;
cursor:pointer;
}

.menu:hover{opacity:1}

/* main */

.main{
flex:1;
padding:40px;
overflow:auto;
}

.header{
font-size:28px;
margin-bottom:6px;
}

.subtitle{
opacity:.6;
margin-bottom:30px;
}

.panel{
background:#1c2147;
padding:30px;
border-radius:14px;
max-width:920px;
box-shadow:0 20px 60px rgba(0,0,0,.4);
}

.section{
margin-bottom:30px;
}

.section-title{
font-size:18px;
margin-bottom:6px;
}

.section-desc{
font-size:13px;
opacity:.6;
margin-bottom:14px;
}

label{
font-size:13px;
opacity:.8;
}

input,textarea{
width:100%;
padding:11px;
border-radius:8px;
border:none;
margin-top:6px;
margin-bottom:10px;
font-size:14px;
}

/* buttons */

.btn{
background:#5b8cff;
border:none;
padding:13px 24px;
border-radius:9px;
font-size:15px;
cursor:pointer;
margin-right:10px;
margin-top:10px;
}

.btn:hover{background:#7aa2ff}

.btn-secondary{
background:#3b3f69;
}

.btn-secondary:hover{
background:#4c5185;
}

/* result */

.result{
margin-top:28px;
background:#0d1029;
padding:24px;
border-radius:10px;
min-height:260px;
white-space:pre-wrap;
line-height:1.7;
}

.loader{
display:none;
margin-top:10px;
opacity:.6;
}

.history-item{
margin-bottom:10px;
opacity:.8;
cursor:pointer;
}

.history-item:hover{
opacity:1;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">通能企業補助</div>

<div class="menu" onclick="showGenerator()">計畫生成</div>
<div class="menu" onclick="showHistory()">生成紀錄</div>

</div>

<div class="main">

<div class="header">通能企業補助計畫生成器</div>
<div class="subtitle">AI 協助生成 SBIR / 創業補助提案</div>

<div class="panel" id="generator">

<div class="section">

<div class="section-title">
基本資料（必填）
</div>

<div class="section-desc">
填寫基本資料，平台AI將依此自動生成完整補助計畫
</div>

<label>公司名稱</label>
<input id="company">

<label>成立年份</label>
<input id="year">

<label>公司簡介</label>
<textarea id="company_desc"></textarea>

<label>團隊背景</label>
<textarea id="team"></textarea>

<label>項目名稱</label>
<input id="project">

<label>項目描述</label>
<textarea id="project_desc"></textarea>

<label>技術核心</label>
<textarea id="tech"></textarea>

</div>

<div class="section">

<div class="section-title">
進階補充（選填）
</div>

<div class="section-desc">
可不填寫，未填寫欄位將由平台AI自動生成
</div>

<label>市場分析</label>
<textarea id="market"></textarea>

<label>目標客戶</label>
<textarea id="customer"></textarea>

<label>競品分析</label>
<textarea id="competitor"></textarea>

<label>差異化優勢</label>
<textarea id="advantage"></textarea>

<label>商業模式</label>
<textarea id="business"></textarea>

<label>研發里程碑</label>
<textarea id="milestone"></textarea>

<label>預期成果</label>
<textarea id="result_expect"></textarea>

</div>

<button class="btn" onclick="generate()">
AI生成完整補助計畫
</button>

<button class="btn btn-secondary" onclick="copyResult()">
複製內容
</button>

<button class="btn btn-secondary" onclick="downloadDoc()">
下載Word
</button>

<button class="btn btn-secondary" onclick="downloadPDF()">
下載PDF
</button>

<div class="loader" id="loader">
AI 正在生成內容...
</div>

<div class="result" id="result" contenteditable="true">
生成結果會顯示在這裡，可直接修改
</div>

</div>

<div class="panel" id="historyPanel" style="display:none">

<div class="section-title">生成紀錄</div>

<div id="history"></div>

</div>

</div>

<script>

function showGenerator(){
document.getElementById("generator").style.display="block"
document.getElementById("historyPanel").style.display="none"
}

function showHistory(){
document.getElementById("generator").style.display="none"
document.getElementById("historyPanel").style.display="block"
renderHistory()
}

async function generate(){

const data={

company:company.value,
year:year.value,
company_desc:company_desc.value,
team:team.value,
project:project.value,
project_desc:project_desc.value,
tech:tech.value,

market:market.value,
customer:customer.value,
competitor:competitor.value,
advantage:advantage.value,
business:business.value,
milestone:milestone.value,
result_expect:result_expect.value

}

loader.style.display="block"
result.innerText=""

const res=await fetch("/api/generate",{

method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(data)

})

const r=await res.json()

loader.style.display="none"
result.innerText=r.result

saveHistory(r.result)

}

function copyResult(){

navigator.clipboard.writeText(result.innerText)

alert("內容已複製")

}

function downloadDoc(){

const text=result.innerText

const blob=new Blob(['\ufeff'+text],{type:'application/msword'})
const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="企業補助計畫書.doc"
a.click()

}

function downloadPDF(){
window.print()
}

function saveHistory(content){

let list=JSON.parse(localStorage.getItem("history")||"[]")

list.unshift({
time:new Date().toLocaleString(),
content
})

localStorage.setItem("history",JSON.stringify(list))

}

function renderHistory(){

const list=JSON.parse(localStorage.getItem("history")||"[]")

const box=document.getElementById("history")

box.innerHTML=""

list.forEach(item=>{

const div=document.createElement("div")

div.className="history-item"
div.innerText=item.time

div.onclick=()=>{

result.innerText=item.content
showGenerator()

}

box.appendChild(div)

})

}

</script>

</body>
</html>
